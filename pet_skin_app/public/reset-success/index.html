<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Changed – PetDerm AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 50%, #d1fae5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Glowing blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }
    .blob-1 { width: 380px; height: 380px; background: #6ee7b7; top: -130px; left: -130px; }
    .blob-2 { width: 320px; height: 320px; background: #a7f3d0; bottom: -100px; right: -100px; }

    /* Card */
    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 48px 40px;
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(16,185,129,0.12), 0 4px 20px rgba(0,0,0,0.06);
      border: 1.5px solid rgba(52,211,153,0.25);
      width: 100%;
      max-width: 400px;
      z-index: 10;
      text-align: center;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Big checkmark circle */
    .check-circle {
      width: 96px; height: 96px;
      background: linear-gradient(135deg, #10b981, #34d399);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 12px 32px rgba(16,185,129,0.35);
      animation: popIn 0.5s cubic-bezier(0.22,1,0.36,1) both 0.1s;
      position: relative;
    }

    /* Ripple rings */
    .check-circle::before,
    .check-circle::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(16,185,129,0.4);
      animation: ripple 1.8s ease-out infinite;
    }
    .check-circle::after { animation-delay: 0.9s; }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .checkmark {
      font-size: 48px;
      color: white;
      line-height: 1;
    }

    /* App icon chip */
    .app-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 40px;
      padding: 6px 16px 6px 8px;
      margin-bottom: 22px;
      font-size: 13px;
      font-weight: 600;
      color: #065f46;
    }
    .app-chip span { font-size: 20px; }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #064e3b;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* Countdown ring */
    .countdown-wrap {
      position: relative;
      width: 68px; height: 68px;
      margin: 0 auto 28px;
    }

    .countdown-wrap svg {
      transform: rotate(-90deg);
    }

    .countdown-wrap circle {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .countdown-track  { stroke: #d1fae5; }
    .countdown-ring   {
      stroke: #10b981;
      stroke-dasharray: 188.5; /* 2π × 30 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .countdown-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #10b981;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #10b981, #34d399);
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(16,185,129,0.3);
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.1px;
    }
    .btn:hover  { opacity: 0.9; box-shadow: 0 10px 30px rgba(16,185,129,0.38); }
    .btn:active { transform: scale(0.98); }

    .footer-note {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 16px;
      line-height: 1.5;
    }

    /* Confetti particles */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>
  <!-- Confetti container (filled by JS) -->
  <div class="confetti-container" id="confetti"></div>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <!-- Success icon -->
    <div class="check-circle">
      <div class="checkmark">✓</div>
    </div>

    <!-- App chip -->
    <div class="app-chip">
      <span>🐾</span> PetDerm AI
    </div>

    <h1>Password Changed!</h1>
    <p class="subtitle">
      Your password has been successfully updated.<br>
      You can now sign in with your new password.
    </p>

    <!-- Countdown ring -->
    <div class="countdown-wrap">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <circle class="countdown-track" cx="34" cy="34" r="30"/>
        <circle class="countdown-ring"  cx="34" cy="34" r="30" id="ring"/>
      </svg>
      <div class="countdown-num" id="countdown-num">5</div>
    </div>

    <!-- Open App button -->
    <button class="btn" id="open-btn" onclick="openApp()">
      Open App &amp; Sign In →
    </button>

    <p class="footer-note">
      If the app doesn't open, close this page<br>
      and open <strong>PetDerm AI</strong> manually.
    </p>
  </div>

  <script>
    const SCHEME  = 'petderm';
    const PACKAGE = 'com.petcare.pet_skin_app';

    const TOTAL    = 5;        // seconds before auto-redirect
    const DASH     = 188.5;    // 2π × r (r=30)

    let remaining = TOTAL;

    // ── Countdown ─────────────────────────────────────────────────────────────
    const ring        = document.getElementById('ring');
    const numEl       = document.getElementById('countdown-num');

    function tick() {
      remaining--;
      numEl.textContent = remaining;
      ring.style.strokeDashoffset = DASH * (1 - remaining / TOTAL);

      if (remaining <= 0) {
        clearInterval(timer);
        openApp();
      }
    }

    const timer = setInterval(tick, 1000);

    // ── Open app via deep-link ────────────────────────────────────────────────
    function openApp() {
      const android = /android/i.test(navigator.userAgent);
      if (android) {
        window.location.href =
          `intent://signin#Intent;scheme=${SCHEME};package=${PACKAGE};end`;
      } else {
        window.location.href = `${SCHEME}://signin`;
      }
    }

    // ── Confetti burst ────────────────────────────────────────────────────────
    const colours = ['#10b981','#34d399','#6ee7b7','#fbbf24','#818cf8','#f472b6'];
    const container = document.getElementById('confetti');

    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${-10 - Math.random() * 20}px;
        background: ${colours[Math.floor(Math.random() * colours.length)]};
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${2 + Math.random() * 3}s;
        animation-delay: ${Math.random() * 1.5}s;
      `;
      container.appendChild(el);
    }
  </script>
</body>
</html>
